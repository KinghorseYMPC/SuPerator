train:
  seed: 42
  device: auto
  batch_size: 4
  epochs: 1
  learning_rate: 0.001
  weight_decay: 0.000001
  max_train_batches_per_epoch: 2
  grad_clip_norm: 1.0

outputs:
  checkpoint_dir: outputs/checkpoints
  result_dir: outputs/pdeagent_task2
